<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 420px;
            min-height: 460px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            padding: 36px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .title {
            font-size: 22px;
        }

        .subtitle {
            letter-spacing: 0.2px;
            line-height: 1.8;
            font-size: 14px;
            opacity: 0.65;
        }

        #purin {
            width: 200px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        #purin.bounce {
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-15px);
            }

            60% {
                transform: translateY(-5px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: 0.25s;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .popup {
            background: #fff;
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transform: scale(0.8);
            transition: 0.3s;
        }

        .overlay.show .popup {
            transform: scale(1);
        }

        .popup-text {
            line-height: 1.8;
            margin-bottom: 16px;
            font-size: 16px;
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 22px 14px;
                min-height: auto;
                gap: 14px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 12px;
            }

            #purin {
                width: 90px;
            }

            .btn {
                font-size: 13px;
                padding: 8px 16px;
            }

            .popup {
                padding: 18px;
            }

            .popup-text {
                font-size: 14px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 26px 18px;
                gap: 16px;
            }

            .title {
                font-size: 20px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 400px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 420px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
                align-items: center;
            }

            .card {
                padding: 14px;
                gap: 10px;
            }

            .title {
                font-size: 16px;
            }

            .subtitle {
                font-size: 11px;
            }

            #purin {
                width: 80px;
            }

            .btn {
                font-size: 12px;
                padding: 6px 14px;
            }

            .popup {
                padding: 16px;
            }

            .popup-text {
                font-size: 13px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">เป็นแฟนกันนะ</div>

        <img src="img/image17.png" alt="teddy" id="purin" onclick="purinClick()">

        <div class="subtitle" id="subtitle">
            คำถามนี้สำคัญกับเรามากเลยนะ
        </div>

        <div class="btn-row">
            <button class="btn" onclick="acceptLove()">ตกลง</button>
            <button class="btn" id="noBtn">ไม่</button>
        </div>

    </div>

    <div class="overlay" id="popup">
        <div class="popup">
            <div class="popup-text">
                ขอบคุณที่เลือกเรา เราจะดูแลเธอให้ดีที่สุด
            </div>
            <button class="btn" onclick="location.href='#'">
                กลับหน้าเมนู
            </button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");
        const subtitle = document.getElementById("subtitle");

        const messages = [
            "ลองคิดดูอีกนิดได้มั้ย",
            "เราจริงจังนะ",
            "เราอยากมีเธอจริง ๆ",
            "ไม่เอานะ อย่าปฏิเสธเลย",
            "เกือบแล้วนะ...",
            "อีกนิดเดียวเอง"
        ];

        let msgIndex = 0;

        noBtn.addEventListener("click", () => {
            if (msgIndex < messages.length) {
                subtitle.textContent = messages[msgIndex];
                msgIndex++;
            }
            noBtn.style.transform = "scale(0.85)";
            noBtn.style.opacity = "0.5";
            setTimeout(() => {
                noBtn.style.transform = "";
                noBtn.style.opacity = "";
            }, 600);
        });

        function purinClick() {
            const el = document.getElementById("purin");
            el.classList.remove("bounce");
            void el.offsetWidth;
            el.classList.add("bounce");
        }

        function acceptLove() {
            document.getElementById("popup").classList.add("show");
        }
    </script>

</body>

</html>
