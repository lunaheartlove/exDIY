<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        /* ── CAKE AREA ── */
        .cake-area {
            margin-top: 20px;
        }

        .cake-wrapper {
            position: relative;
            margin: auto;
            width: 240px;
            height: 240px;
        }

        /* ── plate ── */
        .plate {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 215px;
            height: 14px;
            background: #F0E6FF;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(180, 150, 220, 0.3);
        }

        /* ── tiers ── */
        .tier {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 14px;
            overflow: visible;
        }

        .tier-bottom {
            bottom: 10px;
            width: 200px;
            height: 62px;
            background: #FFB3D1;
            box-shadow: 0 6px 16px rgba(255, 140, 170, 0.3);
        }

        .tier-middle {
            bottom: 67px;
            width: 155px;
            height: 52px;
            background: #BFE7FF;
            box-shadow: 0 5px 12px rgba(100, 180, 255, 0.25);
        }

        .tier-top {
            bottom: 114px;
            width: 110px;
            height: 44px;
            background: #E2C6FF;
            box-shadow: 0 4px 10px rgba(180, 130, 255, 0.25);
        }

        /* ── frosting drips on top edge of each tier ── */
        .drips {
            position: absolute;
            top: -8px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-evenly;
            pointer-events: none;
        }

        .drips span {
            display: block;
            border-radius: 50%;
            background: white;
            opacity: 0.92;
        }

        .tier-bottom .drips span {
            width: 16px;
            height: 16px;
        }

        .tier-middle .drips span {
            width: 14px;
            height: 14px;
        }

        .tier-top .drips span {
            width: 12px;
            height: 12px;
        }

        /* ── dot decorations ── */
        .dots {
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            pointer-events: none;
        }

        .dots span {
            display: block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .tier-bottom .dots span:nth-child(odd) {
            background: white;
            opacity: 0.7;
        }

        .tier-bottom .dots span:nth-child(even) {
            background: #E2C6FF;
            opacity: 0.9;
        }

        .tier-middle .dots span:nth-child(odd) {
            background: white;
            opacity: 0.7;
        }

        .tier-middle .dots span:nth-child(even) {
            background: #FFB3D1;
            opacity: 0.9;
        }

        .tier-top .dots span:nth-child(odd) {
            background: white;
            opacity: 0.7;
        }

        .tier-top .dots span:nth-child(even) {
            background: #BFE7FF;
            opacity: 0.9;
        }

        /* ── candles ── */
        .candles {
            position: absolute;
            bottom: 158px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
        }

        .candle {
            width: 11px;
            height: 34px;
            border-radius: 4px;
            position: relative;
        }

        .candle:nth-child(1) {
            background: linear-gradient(to right, #FFB3D1, #FF8FAB);
        }

        .candle:nth-child(2) {
            background: linear-gradient(to right, #BFE7FF, #7BBFFF);
        }

        .candle:nth-child(3) {
            background: linear-gradient(to right, #E2C6FF, #C49EFF);
        }

        /* wick */
        .candle::before {
            content: "";
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 6px;
            background: #7A5C8A;
            border-radius: 1px;
        }

        /* ── flame ── */
        .flame {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 13px;
            height: 20px;
            background: radial-gradient(ellipse at 50% 80%, #fff 8%, #FFE566 38%, #FF8C00 78%);
            border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
            animation: flicker 0.7s ease-in-out infinite alternate;
            transform-origin: bottom center;
        }

        @keyframes flicker {
            from {
                transform: translateX(-50%) scaleX(1) scaleY(1) rotate(-2deg);
            }

            to {
                transform: translateX(-50%) scaleX(0.85) scaleY(1.12) rotate(2deg);
            }
        }

        .off .flame {
            opacity: 0;
            animation: none;
        }

        /* ── wish & button (unchanged) ── */
        .wish {
            margin-top: 20px;
            font-size: 18px;
            opacity: 0;
            transition: 0.4s;
        }

        .wish.show {
            opacity: 1;
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 20px 14px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 16px;
            }

            .cake-wrapper {
                width: 180px;
                height: 180px;
            }

            .plate {
                width: 160px;
                height: 10px;
            }

            .tier-bottom {
                width: 150px;
                height: 50px;
            }

            .tier-middle {
                width: 120px;
                height: 42px;
                bottom: 55px;
            }

            .tier-top {
                width: 85px;
                height: 36px;
                bottom: 95px;
            }

            .candles {
                bottom: 125px;
                gap: 8px;
            }

            .candle {
                height: 26px;
                width: 9px;
            }

            .flame {
                width: 10px;
                height: 16px;
                top: -18px;
            }

            .wish {
                font-size: 14px;
            }

            .btn {
                font-size: 13px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 24px 18px;
            }

            .cake-wrapper {
                width: 200px;
                height: 200px;
            }

            .plate {
                width: 180px;
            }

            .tier-bottom {
                width: 170px;
            }

            .tier-middle {
                width: 135px;
                bottom: 60px;
            }

            .tier-top {
                width: 95px;
                bottom: 105px;
            }

            .candles {
                bottom: 140px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 400px;
            }

            .cake-wrapper {
                width: 220px;
                height: 220px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 420px;
            }

            .cake-wrapper {
                width: 240px;
                height: 240px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
                align-items: center;
            }

            .card {
                padding: 14px;
            }

            .title {
                font-size: 16px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .cake-wrapper {
                width: 160px;
                height: 160px;
            }

            .plate {
                width: 140px;
            }

            .tier-bottom {
                width: 130px;
                height: 42px;
            }

            .tier-middle {
                width: 100px;
                height: 34px;
                bottom: 48px;
            }

            .tier-top {
                width: 70px;
                height: 28px;
                bottom: 82px;
            }

            .candles {
                bottom: 105px;
            }

            .candle {
                height: 22px;
                width: 8px;
            }

            .flame {
                width: 9px;
                height: 14px;
                top: -16px;
            }

            .wish {
                font-size: 13px;
            }

            .btn {
                font-size: 12px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .flame {
                animation: none !important;
            }

            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">เป่าเค้กวันเกิด</div>
        <div class="subtitle">หลับตาแล้วอธิษฐานนะ</div>

        <div class="cake-area">
            <div class="cake-wrapper" id="cake">

                <div class="plate"></div>

                <div class="tier tier-bottom">
                    <div class="drips">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                    <div class="dots">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </div>

                <div class="tier tier-middle">
                    <div class="drips">
                        <span></span><span></span><span></span>
                        <span></span><span></span>
                    </div>
                    <div class="dots">
                        <span></span><span></span><span></span>
                        <span></span><span></span>
                    </div>
                </div>

                <div class="tier tier-top">
                    <div class="drips">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <div class="dots">
                        <span></span><span></span><span></span><span></span>
                    </div>
                </div>

                <div class="candles">
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                </div>

            </div>

            <div class="wish" id="wish">
                Happy Birthday
            </div>

            <button class="btn" id="mainBtn">เป่าเทียนวันเกิด</button>

        </div>

    </div>

    <script>
        const cake = document.getElementById("cake");
        const btn = document.getElementById("mainBtn");
        const wish = document.getElementById("wish");

        btn.onclick = () => {

            cake.classList.add("off");
            wish.classList.add("show");

            btn.innerText = "ดูตัวอย่างเมนูอื่น";
            btn.onclick = () => {
                location.href = "https://lunaheartlove.github.io/exampleDIY/";
            };
        };
    </script>

</body>

</html>
