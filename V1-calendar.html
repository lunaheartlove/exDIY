<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FFB3D1, #BFE7FF, #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .days {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .small {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 16px;
        }

        .photo {
            width: 240px;
            height: 240px;
            border-radius: 18px;
            object-fit: cover;
            margin-bottom: 18px;
        }

        .time-boxes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .box {
            background: #ffffffcc;
            border-radius: 14px;
            padding: 12px 0;
            box-shadow: inset 0 0 0 1px #eee;
        }

        .love-group {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .love-item {
            padding: 10px 12px;
            border-radius: 14px;
            background: #ffffffcc;
            box-shadow: inset 0 0 0 1px #eee;
            text-align: left;
        }

        .love-label {
            font-size: 13px;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .progress-bar {
            width: 100%;
            height: 18px;
            background: #eee;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 500;
            transition: width 0.6s ease;
        }

        .love {
            background: linear-gradient(90deg, #FF9ECF, #FFB3D1);
        }

        .miss {
            background: linear-gradient(90deg, #A0D8FF, #BFE7FF);
        }

        .happy {
            background: linear-gradient(90deg, #D8C6FF, #E2C6FF);
        }

        .btn {
            margin-top: 14px;
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 20px 14px;
            }

            .title {
                font-size: 18px;
            }

            .days {
                font-size: 32px;
            }

            .small {
                font-size: 12px;
                margin-bottom: 12px;
            }

            .photo {
                width: 160px;
                height: 160px;
                margin-bottom: 14px;
            }

            .time-boxes {
                gap: 6px;
            }

            .box {
                padding: 8px 0;
            }

            .box h3 {
                font-size: 14px;
            }

            .box p {
                font-size: 11px;
            }

            .btn {
                font-size: 12px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 24px 18px;
            }

            .days {
                font-size: 36px;
            }

            .photo {
                width: 180px;
                height: 180px;
            }

            .box h3 {
                font-size: 16px;
            }

            .box p {
                font-size: 12px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 440px;
            }

            .photo {
                width: 200px;
                height: 200px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 480px;
            }

            .photo {
                width: 220px;
                height: 220px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
                align-items: center;
            }

            .card {
                padding: 14px;
            }

            .title {
                font-size: 16px;
            }

            .days {
                font-size: 26px;
            }

            .photo {
                width: 120px;
                height: 120px;
                margin-bottom: 10px;
            }

            .box h3 {
                font-size: 12px;
            }

            .box p {
                font-size: 10px;
            }

            .btn {
                font-size: 12px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">เราคบกันมาแล้ว</div>

        <div class="days" id="daysCount">0</div>
        <div class="small">วัน</div>

        <img src="img/p2.jpg" class="photo">

        <div class="time-boxes">
            <div class="box">
                <h3 id="days">0</h3>
                <p>วัน</p>
            </div>
            <div class="box">
                <h3 id="hours">0</h3>
                <p>ชั่วโมง</p>
            </div>
            <div class="box">
                <h3 id="minutes">0</h3>
                <p>นาที</p>
            </div>
            <div class="box">
                <h3 id="seconds">0</h3>
                <p>วินาที</p>
            </div>
        </div>

        <!--<div class="love-group">

            <div class="love-item">
                <div class="love-label">ความรัก</div>
                <div class="progress-bar">
                    <div class="progress-fill love" id="loveBar">100%</div>
                </div>
            </div>

            <div class="love-item">
                <div class="love-label">ความคิดถึง</div>
                <div class="progress-bar">
                    <div class="progress-fill miss" id="missBar">0%</div>
                </div>
            </div>

            <div class="love-item">
                <div class="love-label">ความสุข</div>
                <div class="progress-bar">
                    <div class="progress-fill happy" id="happyBar">0%</div>
                </div>
            </div>

        </div> -->

        <button class="btn" onclick="location.href='#'">
            กลับหน้าเมนู
        </button>

    </div>

    <script>
        const startDate = new Date("2025-05-04T20:00:00");

        function updateLoveTime() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById("daysCount").innerText = days;
            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;

            document.getElementById("loveBar").style.width = "100%";

            let miss = 70 + Math.floor(Math.random() * 30);
            document.getElementById("missBar").style.width = miss + "%";
            document.getElementById("missBar").innerText = miss + "%";

            let happy = 80 + Math.floor(Math.random() * 20);
            document.getElementById("happyBar").style.width = happy + "%";
            document.getElementById("happyBar").innerText = happy + "%";
        }

        updateLoveTime();
        setInterval(updateLoveTime, 1000);
    </script>

</body>

</html>
