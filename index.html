<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
        }

        .card {
            width: 90%;
            max-width: 420px;
            min-height: 480px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            padding: 25px;
            text-align: center;
        }

        .card img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 16px;
        }

        .title {
            font-size: 20px;
            color: #5A4B6E;
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.45);
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="img/image1.png" alt="gift">

        <div class="title">มีของขวัญมาส่ง!</div>

        <button class="btn" onclick="goNext()">รับของขวัญ</button>
    </div>

    <script>
        function goNext() {
            window.location.href = "pass.html";
        }
    </script>

</body>

</html>
