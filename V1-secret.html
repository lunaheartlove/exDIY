<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 520px;
            /* จาก 420 → 520 */
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 34px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .subtitle {
            letter-spacing: 0.2px;
            line-height: 1.8;
            font-size: 15px;
            opacity: 0.7;
            margin-bottom: 24px;
        }

        .scratch-wrapper {
            position: relative;
            width: 320px;
            /* จาก 240 → 320 */
            aspect-ratio: 1/1;
            margin: 0 auto 20px;
            border-radius: 22px;
            overflow: hidden;
            background: #f5f5f5;
        }

        .hidden-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .sweet-message {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;

            font-size: 16px;
            line-height: 1.8;
            font-weight: 500;

            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .sweet-message.show {
            opacity: 1;
        }

        .hint {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 24px;
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 20px 14px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 13px;
                margin-bottom: 18px;
            }

            .scratch-wrapper {
                width: 220px;
            }

            .sweet-message {
                font-size: 13px;
                padding: 14px;
            }

            .hint {
                font-size: 12px;
                margin-bottom: 18px;
            }

            .btn {
                font-size: 12px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 24px 18px;
            }

            .scratch-wrapper {
                width: 260px;
            }

            .sweet-message {
                font-size: 14px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 460px;
            }

            .scratch-wrapper {
                width: 290px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 500px;
            }

            .scratch-wrapper {
                width: 320px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
                align-items: center;
            }

            .card {
                padding: 14px;
            }

            .title {
                font-size: 16px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 10px;
            }

            .scratch-wrapper {
                width: 200px;
            }

            .sweet-message {
                font-size: 12px;
                padding: 12px;
            }

            .hint {
                font-size: 11px;
                margin-bottom: 12px;
            }

            .btn {
                font-size: 11px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">เกมขูดรูปภาพ</div>
        <div class="subtitle">ขูดเพื่อดูสิ่งที่ซ่อนอยู่</div>

        <div class="scratch-wrapper">
            <img src="img/p2.jpg" class="hidden-image">

            <canvas id="scratch"></canvas>

            <div class="sweet-message" id="sweetMessage">
                ขอบคุณนะที่อยู่ข้างกันตลอด<br>
                มีเธออยู่ด้วย มันทำให้ทุกวันดีขึ้นจริง ๆ
            </div>
        </div>

        <div class="hint">แตะหรือลากเบา ๆ เพื่อขูด</div>

        <a href="#" class="btn">
            กลับหน้าเมนู
        </a>

    </div>

    <script>
        const canvas = document.getElementById("scratch");
        const ctx = canvas.getContext("2d");
        const sweetMessage = document.getElementById("sweetMessage");

        let scratching = false;
        let revealed = false;

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            ctx.globalCompositeOperation = "source-over";
            ctx.fillStyle = "#8B7BAF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.globalCompositeOperation = "destination-out";
        }

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            return { x, y };
        }

        function start(e) {
            scratching = true;
            draw(e);
        }

        function end() {
            scratching = false;
            checkProgress();
        }

        function draw(e) {
            if (!scratching) return;
            const { x, y } = getPos(e);
            ctx.beginPath();
            ctx.arc(x, y, 24, 0, Math.PI * 2);
            ctx.fill();
        }

        function checkProgress() {
            if (revealed) return;

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let cleared = 0;

            for (let i = 3; i < imageData.data.length; i += 4) {
                if (imageData.data[i] === 0) cleared++;
            }

            const percent = cleared / (canvas.width * canvas.height);

            if (percent > 0.45) {
                revealed = true;
                setTimeout(() => {
                    sweetMessage.classList.add("show");
                }, 600);
            }
        }

        canvas.addEventListener("mousedown", start);
        canvas.addEventListener("mousemove", draw);
        canvas.addEventListener("mouseup", end);
        canvas.addEventListener("mouseleave", end);

        canvas.addEventListener("touchstart", e => {
            e.preventDefault();
            start(e);
        }, { passive: false });

        canvas.addEventListener("touchmove", e => {
            e.preventDefault();
            draw(e);
        }, { passive: false });

        canvas.addEventListener("touchend", e => {
            e.preventDefault();
            end();
        });
    </script>

</body>

</html>
