<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            letter-spacing: 0.2px;
            line-height: 1.8;
            font-size: 14px;
            opacity: 0.65;
            margin-bottom: 22px;
        }

        .stage {
            position: relative;
            width: 100%;
            height: 340px;
            margin-bottom: 20px;
            overflow: visible;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gift-box {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 240px;
            cursor: pointer;
            transition: opacity 0.4s ease;
            z-index: 5;
        }

        .gift-box.hide {
            opacity: 0;
            pointer-events: none;
        }

        .gift-box.shake {
            animation: boxShake 0.5s ease-in-out 3;
        }

        @keyframes boxShake {

            0%,
            100% {
                transform: translate(-50%, -50%) rotate(0);
            }

            25% {
                transform: translate(-50%, -50%) rotate(-4deg);
            }

            75% {
                transform: translate(-50%, -50%) rotate(4deg);
            }
        }

        .box-lid-group {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 130px;
            transform-origin: center 80%;
            transition:
                transform 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.5s ease 0.5s;
            z-index: 2;
        }

        .gift-box.opening .box-lid-group {
            transform: translateX(-50%) translateY(-130px) rotate(-20deg);
            opacity: 0;
        }

        .box-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 160px;
            z-index: 1;
        }

        .bouquet-wrap {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 280px;
            height: 320px;
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s;
            z-index: 4;
        }

        .bouquet-wrap.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .bouquet-wrap.sway {
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {

            0%,
            100% {
                transform: translate(-50%, -50%) rotate(-3deg);
            }

            50% {
                transform: translate(-50%, -50%) rotate(3deg);
            }
        }

        .bouquet-wrap svg {
            width: 100%;
            height: 100%;
        }

        .burst {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 0;
            height: 0;
            z-index: 3;
            pointer-events: none;
        }

        .burst span {
            position: absolute;
            font-size: 22px;
            opacity: 0;
        }

        .gift-box.opening~.burst span {
            animation: burstOut 0.9s ease-out forwards;
        }

        @keyframes burstOut {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.3);
            }

            30% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(1.2);
            }
        }

        .floating-heart {
            position: absolute;
            font-size: 20px;
            color: #FF7FA8;
            opacity: 0;
            pointer-events: none;
            animation: floatUp 2.5s ease-out forwards;
            z-index: 3;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5);
            }

            20% {
                opacity: 1;
                transform: translateY(-20px) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-160px) scale(0.8);
            }
        }

        .message {
            display: none;
            padding: 16px 18px;
            background: linear-gradient(135deg,
                    rgba(255, 179, 209, 0.2),
                    rgba(226, 198, 255, 0.25));
            border: 1px dashed rgba(139, 123, 175, 0.3);
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 18px;
        }

        .message.show {
            display: block;
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-block;
            font-family: 'Mali', cursive;
            margin: 4px;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.45);
        }

        .btn-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            min-height: 52px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 360px) {
            .card {
                padding: 20px 14px;
                border-radius: 22px;
            }

            .title {
                font-size: 18px;
            }

            .stage {
                height: 290px;
            }

            .gift-box {
                width: 185px;
                height: 205px;
            }

            .box-lid-group {
                width: 185px;
                height: 110px;
            }

            .box-body {
                width: 170px;
                height: 135px;
            }

            .bouquet-wrap {
                width: 240px;
                height: 270px;
            }

            .message {
                font-size: 13px;
                padding: 12px;
            }

            .btn {
                font-size: 14px;
                padding: 8px 18px;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                align-items: flex-start;
                padding: 10px 0;
            }

            .stage {
                height: 240px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }

            .bouquet-wrap {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

        <div class="btn-area">

        </div>

    <script>
        let opened = false;
        const giftBox = document.getElementById("giftBox");

        const shakeInterval = setInterval(() => {
            if (!opened) {
                giftBox.classList.add("shake");
                setTimeout(() => giftBox.classList.remove("shake"), 1500);
            } else {
                clearInterval(shakeInterval);
            }
        }, 3000);

        function openGift() {
            if (opened) return;
            opened = true;

            const bouquet = document.getElementById("bouquet");
            const message = document.getElementById("message");
            const subtitle = document.getElementById("subtitle");
            const btnBack = document.getElementById("btnBack");
            const stage = document.getElementById("stage");
            const burst = document.getElementById("burst");

            giftBox.classList.remove("shake");
            giftBox.classList.add("opening");

            //const emojis = ["✨", "💖", "♡", "🌸", "💕", "⭐", "💫", "✿"];
            const emojis = [""];
            for (let i = 0; i < 10; i++) {
                const span = document.createElement("span");
                span.textContent = emojis[i % emojis.length];
                const angle = (i / 10) * Math.PI * 2;
                const dist = 80 + Math.random() * 40;
                span.style.setProperty("--dx", `${Math.cos(angle) * dist}px`);
                span.style.setProperty("--dy", `${Math.sin(angle) * dist}px`);
                span.style.animationDelay = (i * 0.05) + "s";
                burst.appendChild(span);
            }

            setTimeout(() => {
                giftBox.classList.add("hide");
                bouquet.classList.add("show");
            }, 600);

            setTimeout(() => {
                bouquet.classList.add("sway");
            }, 1900);

            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const heart = document.createElement("div");
                    heart.className = "floating-heart";
                    heart.style.left = (25 + Math.random() * 50) + "%";
                    heart.style.bottom = "35%";
                    heart.style.animationDelay = (Math.random() * 0.4) + "s";
                    stage.appendChild(heart);
                    setTimeout(() => heart.remove(), 3000);
                }, 900 + i * 180);
            }

            subtitle.textContent = "รับแล้วนะ ขอบคุณที่รับไว้";

            setTimeout(() => {
                message.classList.add("show");
                btnBack.classList.remove("hidden");
            }, 2100);
        }
    </script>
