<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            letter-spacing: 0.2px;
            line-height: 1.8;
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 22px;
        }

        .vinyl-wrapper {
            width: 200px;
            height: 200px;
            margin: 0 auto 22px;
            position: relative;
        }

        .vinyl {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background:
                radial-gradient(circle at center, #666 0 8%, #2f2f2f 9% 100%);
            animation: spin 12s linear infinite;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.25);
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .vinyl-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #fff;
            background: #fff;
        }

        .vinyl-center img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .song-box {
            position: relative;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 20px 18px;
            margin: 22px 0 20px;

            font-size: 15px;
            line-height: 1.9;
            font-weight: 500;

            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);

            text-align: center;
        }

        .song-box::after {
            position: absolute;
            top: 6px;
            left: 10px;
            font-size: 26px;
            opacity: 0.2;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 20px 14px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 16px;
            }

            .vinyl-wrapper {
                width: 150px;
                height: 150px;
                margin-bottom: 16px;
            }

            .vinyl-center {
                width: 60px;
                height: 60px;
            }

            .song-box {
                font-size: 13px;
                padding: 14px;
                margin: 16px 0;
            }

            .btn {
                font-size: 12px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 24px 18px;
            }

            .vinyl-wrapper {
                width: 170px;
                height: 170px;
            }

            .vinyl-center {
                width: 70px;
                height: 70px;
            }

            .song-box {
                font-size: 14px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 400px;
            }

            .vinyl-wrapper {
                width: 190px;
                height: 190px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 420px;
            }

            .vinyl-wrapper {
                width: 200px;
                height: 200px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
                align-items: center;
            }

            .card {
                padding: 14px;
            }

            .title {
                font-size: 16px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .vinyl-wrapper {
                width: 130px;
                height: 130px;
                margin-bottom: 12px;
            }

            .vinyl-center {
                width: 50px;
                height: 50px;
            }

            .song-box {
                font-size: 12px;
                padding: 12px;
            }

            .btn {
                font-size: 11px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .vinyl {
                animation: none !important;
            }

            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">เพลงของเรา</div>
        <div class="subtitle">เพลงนี้อยากให้เธอฟัง</div>

        <div class="vinyl-wrapper">
            <div class="vinyl"></div>
            <div class="vinyl-center">
                <img src="img/p1.jpg">
            </div>
        </div>

        <div class="song-box">
            เพลงนี้อาจไม่ได้พิเศษสำหรับใคร แต่สำหรับเรา มันคือทุกความรู้สึกที่มีให้เธอ
        </div>

        <div class="btn-row">
            <a href="https://youtube.com" target="_blank" class="btn">
                เปิดเพลงนี้
            </a>

            <button class="btn" onclick="location.href='https://lunaheartlove.github.io/exampleDIY/'">
                ดูตัวอย่างเมนูอื่น
            </button>
        </div>

    </div>

</body>

</html>
