<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FFB3D1, #BFE7FF, #E2C6FF);
            color: #5A4B6E;
            padding: 24px 0;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 30px 24px 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .face-wrap {
            margin: 0 auto 18px;
            width: 90px;
            height: 90px;
            position: relative;
        }

        .face {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #FFE4B3;
            border: 3px solid #F5C97A;
            position: relative;
            overflow: hidden;
            transition: background 0.4s;
        }

        .eyes {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 30px;
        }

        .eye {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #5A4B6E;
            position: relative;
            transition: all 0.3s;
        }

        /* ===== หน้าเศร้า: คิ้วลู่ขึ้นด้านใน (↗↖) ===== */
        .sad .eye::before {
            content: "";
            position: absolute;
            top: -8px;
            left: -3px;
            width: 14px;
            height: 4px;
            background: #5A4B6E;
            border-radius: 2px;
            transform: rotate(-18deg);
            transition: transform 0.3s;
        }

        .sad .eye:last-child::before {
            transform: rotate(18deg);
        }

        /* ตาหยิบเล็ก (half-closed) ตอนเศร้า */
        .sad .eye {
            height: 8px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        }

        /* ===== หน้าดีใจ: คิ้วโค้งลง (ตาหยี) ===== */
        .happy .eye::before {
            content: "";
            position: absolute;
            top: -7px;
            left: -3px;
            width: 14px;
            height: 4px;
            background: #5A4B6E;
            border-radius: 2px;
            transform: rotate(-8deg);
        }

        .happy .eye:last-child::before {
            transform: rotate(8deg);
        }

        /* ===== ปากเศร้า (โค้งลง + มุมปากย้อย) ===== */
        .mouth {
            margin: 12px auto 0;
            width: 28px;
            height: 14px;
            border-radius: 0 0 16px 16px;
            border: 3px solid #5A4B6E;
            border-top: none;
            transition: all 0.4s;
        }

        .sad .mouth {
            width: 16px;
            height: 10px;
            border-radius: 50% 50% 0 0;
            border: 3px solid #5A4B6E;
            border-bottom: none;
            margin-top: 16px;
        }

        /* ===== น้ำตา (ย้ายตำแหน่งให้ใกล้ตาขึ้น) ===== */
        .tear {
            position: absolute;
            width: 8px;
            height: 12px;
            background: linear-gradient(180deg, #BFE7FF, #7FBFE0);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            top: 42px;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: inset -1px -1px 2px rgba(0, 0, 0, 0.1);
        }

        .tear::before {
            content: "";
            position: absolute;
            top: 2px;
            left: 1px;
            width: 2px;
            height: 4px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
        }

        .tear-l {
            left: 16px;
        }

        .tear-r {
            right: 16px;
        }

        .sad .tear {
            opacity: 1;
            animation: tearDrop 1.4s ease-in infinite;
        }

        @keyframes tearDrop {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            70% {
                transform: translateY(18px);
                opacity: 0.7;
            }

            100% {
                transform: translateY(22px);
                opacity: 0;
            }
        }

        /* ===== แก้มแดงตอนดีใจ ===== */
        .blush {
            position: absolute;
            width: 18px;
            height: 9px;
            border-radius: 50%;
            background: #FFB3D1;
            opacity: 0;
            top: 48px;
            transition: opacity 0.4s;
        }

        .blush-l {
            left: 10px;
        }

        .blush-r {
            right: 10px;
        }

        .happy .blush {
            opacity: 0.7;
        }

        .face.happy-face {
            background: #FFF0C8;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            color: #5A4B6E;
            margin-bottom: 6px;
            transition: all 0.4s;
        }

        .subtitle {
            font-size: 14px;
            color: #9B8CB0;
            margin-bottom: 22px;
            min-height: 22px;
            transition: all 0.4s;
        }

        .msg-box {
            background: #ffffffcc;
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 1px #eee;
            font-size: 15px;
            line-height: 1.9;
            color: #5A4B6E;
            text-align: left;
            min-height: 100px;
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
            font-family: 'Mali', cursive;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.45);
        }

        .btn-row {
            display: flex;
            justify-content: center;
            margin-bottom: 14px;
        }

        .result-box {
            display: none;
            background: linear-gradient(135deg, rgba(255, 179, 209, 0.2), rgba(226, 198, 255, 0.2));
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1.5px solid #E8D8FF;
            font-size: 15px;
            line-height: 2;
            color: #5A4B6E;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hearts-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 999;
        }

        .heart-piece {
            position: absolute;
            font-size: 22px;
            opacity: 0;
            animation: heartFall 1.6s ease-out forwards;
        }

        @keyframes heartFall {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-180px) scale(0.4);
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 22px 14px 20px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 16px;
            }

            .face-wrap,
            .face {
                width: 70px;
                height: 70px;
            }

            .eyes {
                margin-top: 22px;
                gap: 12px;
            }

            .eye {
                width: 8px;
                height: 8px;
            }

            .mouth {
                width: 22px;
                height: 11px;
            }

            .sad .mouth {
                width: 13px;
                height: 8px;
            }

            .msg-box {
                font-size: 13px;
                padding: 12px;
                min-height: auto;
            }

            .result-box {
                font-size: 13px;
                padding: 14px;
            }

            .btn {
                font-size: 13px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 24px 18px 22px;
            }

            .face-wrap,
            .face {
                width: 80px;
                height: 80px;
            }

            .msg-box {
                font-size: 14px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 400px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 420px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
                align-items: center;
            }

            .card {
                padding: 14px;
            }

            .title {
                font-size: 16px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .face-wrap,
            .face {
                width: 60px;
                height: 60px;
                margin-bottom: 10px;
            }

            .eyes {
                margin-top: 18px;
            }

            .eye {
                width: 7px;
                height: 7px;
            }

            .mouth {
                width: 18px;
                height: 9px;
            }

            .sad .mouth {
                width: 11px;
                height: 7px;
            }

            .msg-box {
                font-size: 12px;
                padding: 10px;
            }

            .result-box {
                font-size: 12px;
                padding: 12px;
            }

            .btn {
                font-size: 12px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="hearts-wrap" id="heartsWrap"></div>

    <div class="card">
        <div class="face-wrap">
            <div class="face sad" id="face">
                <div class="blush blush-l"></div>
                <div class="blush blush-r"></div>
                <div class="tear tear-l"></div>
                <div class="tear tear-r"></div>
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mouth"></div>
            </div>
        </div>

        <div class="title" id="mainTitle">ขอโทษนะ</div>
        <div class="subtitle" id="mainSub">เค้าผิดเองจริง ๆ</div>

        <div class="msg-box" id="msgBox">
            รู้ว่าทำให้เธอเจ็บปวด และเสียใจ<br>
            เค้าไม่ได้ตั้งใจเลยสักนิด<br>
            แต่รู้ว่าคำขอโทษอย่างเดียวอาจไม่พอ<br><br>
            เค้าแค่อยากให้เธอรู้ว่า<br>
            เธอสำคัญกับเค้ามากที่สุดเลย
        </div>

        <div id="phase1">
            <div class="btn-row">
                <button class="btn" onclick="sayYes()">ดีกันนน</button>
            </div>
        </div>

        <div class="result-box" id="resultBox">
            ขอบคุณที่ยกโทษให้นะ<br>
            เค้าจะไม่ทำแบบนี้อีกแล้ว<br>
            รักเธอมากที่สุดเลย
        </div>

        <div id="phase2Btns" style="display:none;">
            <button class="btn" onclick="location.href='#'">กลับหน้าเมนู</button>
        </div>
    </div>

    <script>
        function sayYes() {
            const face = document.getElementById("face");
            face.classList.remove("sad");
            face.classList.add("happy");
            face.classList.add("happy-face");

            document.getElementById("mainTitle").innerText = "คืนดีกันแล้วนะ";
            document.getElementById("mainSub").innerText = "รักเธอมาก ๆ เลย";

            document.getElementById("msgBox").style.display = "none";
            document.getElementById("phase1").style.display = "none";
            document.getElementById("resultBox").style.display = "block";
            document.getElementById("phase2Btns").style.display = "block";

            burstHearts();
        }

        function burstHearts() {
            const wrap = document.getElementById("heartsWrap");
            for (let i = 0; i < 28; i++) {
                const el = document.createElement("div");
                el.className = "heart-piece";
                el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = (20 + Math.random() * 60) + "%";
                el.style.top = (40 + Math.random() * 30) + "%";
                el.style.color = ["#FFB3D1", "#E2C6FF", "#BFE7FF", "#FF8FAB", "#C49EFF"][Math.floor(Math.random() * 5)];
                el.style.animationDelay = (Math.random() * 0.6) + "s";
                el.style.animationDuration = (1 + Math.random() * 0.8) + "s";
                wrap.appendChild(el);
            }
            setTimeout(() => wrap.innerHTML = "", 3000);
        }
    </script>

</body>

</html>
