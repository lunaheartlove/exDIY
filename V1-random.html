<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>LOVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 25px;
        }

        .wheel-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 10px auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #8B7BAF;
            background: conic-gradient(#FFD6F4 0deg 60deg,
                    #C8F4FF 60deg 120deg,
                    #FFECC7 120deg 180deg,
                    #FFC2D1 180deg 240deg,
                    #CDEAC0 240deg 300deg,
                    #E2D4FF 300deg 360deg);
            transition: transform 4s cubic-bezier(.17, .67, .35, 1.28);
        }

        .pointer {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 18px solid #8B7BAF;
        }

        .status {
            font-size: 14px;
            margin-top: 10px;
            min-height: 20px;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: 0.25s;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        .popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .popup.show {
            display: flex;
        }

        .popup-box {
            background: #fff;
            padding: 22px;
            border-radius: 20px;
            text-align: center;
            width: 260px;
        }

        .popup-box h2 {
            font-size: 18px;
            margin-bottom: 6px;
        }

        .popup-box p {
            font-size: 15px;
            margin-bottom: 10px;
        }

        @media (max-width: 360px) {
            .wheel-container {
                width: 220px;
                height: 220px;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">วงล้อตามใจ</div>
        <div class="subtitle">หมุนแล้วส่งผลลัพธ์ได้เลย</div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <div id="wheel" class="wheel"></div>
        </div>

        <div class="status" id="status">กดหมุนได้เลย</div>

        <div class="btn-row">
            <button class="btn" id="spinBtn">หมุนวงล้อ</button>
            <button class="btn" onclick="location.href='#'">กลับหน้าเมนู</button>
        </div>

    </div>

    <div id="popup" class="popup">
        <div class="popup-box">
            <h2>ผลลัพธ์</h2>
            <p id="resultText"></p>
            <button class="btn" onclick="closePopup()">ปิด</button>
        </div>
    </div>

    <script>
        const wheel = document.getElementById("wheel");
        const status = document.getElementById("status");
        const popup = document.getElementById("popup");
        const resultText = document.getElementById("resultText");

        const options = [
            'พาไปกินของอร่อย',
            'เล่นเกมด้วยกัน',
            'ดูหนังด้วยกัน',
            'ตามใจ 1 อย่าง',
            'เลือกเมนูวันนี้',
            'บอกรัก 1 ครั้ง'
        ];

        let spinning = false;
        let rotation = 0;

        document.getElementById("spinBtn").onclick = () => {
            if (spinning) return;
            spinning = true;

            const segments = options.length;
            const segmentAngle = 360 / segments;

            const randomIndex = Math.floor(Math.random() * segments);
            const extra = 3 + Math.floor(Math.random() * 3);

            const final =
                rotation +
                extra * 360 +
                (90 - (randomIndex * segmentAngle + segmentAngle / 2));

            rotation = final;
            wheel.style.transform = `rotate(${final}deg)`;

            status.innerText = "กำลังหมุน...";
        };

        wheel.addEventListener("transitionend", () => {
            const segments = options.length;
            const segmentAngle = 360 / segments;

            let normalized = ((rotation % 360) + 360) % 360;
            const angle = (90 - normalized + 360) % 360;

            const index = Math.floor(angle / segmentAngle);

            const result = options[index];

            resultText.innerText = result;
            popup.classList.add("show");

            status.innerText = `ผลลัพธ์ที่ได้: ${result}`;
            spinning = false;
        });

        function closePopup() {
            popup.classList.remove("show");
        }
    </script>

</body>

</html>
