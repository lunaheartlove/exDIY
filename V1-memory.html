<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 22px;
            margin-bottom: 18px;
        }

        .slider-wrapper {
            position: relative;
        }

        .slider {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }

        .slider::-webkit-scrollbar {
            display: none;
        }

        .memory-card {
            min-width: 100%;
            scroll-snap-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 20px;
        }

        .memory-card.pink {
            border: 2px solid #FFD1DC;
        }

        .memory-card.blue {
            border: 2px solid #CDE7FF;
        }

        .memory-card.yellow {
            border: 2px solid #FFF1B8;
        }

        .memory-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 14px;
            background: #f5f5f5;
        }

        .memory-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .memory-title {
            font-size: 16px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .memory-text {
            font-size: 14px;
            line-height: 1.8;
            text-align: left;
            opacity: 0.9;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #8B7BAFcc;
            cursor: pointer;
            font-size: 18px;
            color: #FFFFFF;
        }

        .arrow.left {
            left: -10px;
        }

        .arrow.right {
            right: -10px;
        }

        .btn {
            margin-top: 20px;
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 22px 14px;
            }

            .title {
                font-size: 18px;
                margin-bottom: 14px;
            }

            .memory-card {
                padding: 14px;
            }

            .memory-title {
                font-size: 14px;
            }

            .memory-text {
                font-size: 12px;
                line-height: 1.6;
            }

            .arrow {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }

            .arrow.left {
                left: -6px;
            }

            .arrow.right {
                right: -6px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 24px 18px;
            }

            .memory-card {
                padding: 16px;
            }

            .memory-title {
                font-size: 15px;
            }

            .memory-text {
                font-size: 13px;
            }

            .arrow {
                width: 32px;
                height: 32px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 400px;
            }

            .memory-card {
                padding: 18px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 420px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
            }

            .card {
                padding: 14px;
            }

            .title {
                font-size: 16px;
                margin-bottom: 10px;
            }

            .memory-card {
                padding: 12px;
            }

            .memory-title {
                font-size: 13px;
            }

            .memory-text {
                font-size: 11px;
            }

            .arrow {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">ความทรงจำของเรา</div>

        <div class="slider-wrapper">

            <button class="arrow left" id="prev">←</button>
            <button class="arrow right" id="next">→</button>

            <div class="slider" id="slider">

                <div class="memory-card pink">
                    <div class="memory-image">
                        <img src="img/p1.jpg">
                    </div>
                    <div class="memory-title">วันแรกที่เจอกัน</div>
                    <div class="memory-text">
                        วันนั้นอาจจะดูธรรมดา แต่สำหรับเค้า มันคือจุดเริ่มต้นของทุกอย่าง
                    </div>
                </div>

                <div class="memory-card blue">
                    <div class="memory-image">
                        <img src="img/p2.jpg">
                    </div>
                    <div class="memory-title">ไปเที่ยวด้วยกัน</div>
                    <div class="memory-text">
                        เป็นวันที่มีความสุขมาก แค่ได้อยู่ด้วยกันก็พอแล้ว
                    </div>
                </div>

                <div class="memory-card yellow">
                    <div class="memory-image">
                        <img src="img/p3.jpg">
                    </div>
                    <div class="memory-title">วันธรรมดาที่พิเศษ</div>
                    <div class="memory-text">
                        ไม่ต้องมีอะไรพิเศษ แค่มีเธออยู่ข้าง ๆ ก็พอแล้ว
                    </div>
                </div>

            </div>

        </div>

        <button class="btn" onclick="location.href='#'">
            กลับหน้าเมนู
        </button>

    </div>

    <script>
        const slider = document.getElementById("slider");
        const next = document.getElementById("next");
        const prev = document.getElementById("prev");

        let index = 0;

        function goToSlide(i) {
            slider.scrollTo({
                left: slider.clientWidth * i,
                behavior: "smooth"
            });
        }

        next.onclick = () => {
            index = (index + 1) % slider.children.length;
            goToSlide(index);
        };

        prev.onclick = () => {
            index = (index - 1 + slider.children.length) % slider.children.length;
            goToSlide(index);
        };
    </script>

</body>

</html>
