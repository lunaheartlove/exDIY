<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 28px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.65;
            margin-bottom: 22px;
        }

        .chat {
            max-height: 160px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
            text-align: left;
        }

        .chat-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .bubble {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            max-width: 240px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            justify-items: center;
            margin: 0 0 16px;
        }

        .card-item {
            width: 72px;
            height: 100px;
            border-radius: 14px;
            background: linear-gradient(135deg, #FFD1DC, #CDE7FF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            transition: 0.25s;
        }

        .card-item:hover {
            transform: translateY(-4px);
        }

        .card-item:active {
            transform: scale(0.95);
        }

        .card-item.opened {
            background: #fff;
        }

        .card-item.dimmed {
            opacity: 0.3;
            pointer-events: none;
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            font-family: 'Mali', cursive;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        #resetBtn,
        #nextBtn {
            display: none;
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 22px 14px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 16px;
            }

            .chat {
                max-height: 130px;
                gap: 8px;
            }

            .avatar {
                width: 26px;
                height: 26px;
            }

            .bubble {
                font-size: 12px;
                padding: 8px 10px;
                max-width: 180px;
            }

            .cards {
                gap: 6px;
            }

            .card-item {
                width: 60px;
                height: 85px;
                font-size: 22px;
            }

            .btn {
                font-size: 12px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 24px 18px;
            }

            .bubble {
                font-size: 13px;
            }

            .card-item {
                width: 66px;
                height: 92px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 400px;
            }

            .card-item {
                width: 70px;
                height: 96px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 420px;
            }

            .card-item {
                width: 72px;
                height: 100px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
                align-items: center;
            }

            .card {
                padding: 14px;
            }

            .title {
                font-size: 16px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .chat {
                max-height: 110px;
            }

            .bubble {
                font-size: 11px;
                padding: 6px 8px;
            }

            .card-item {
                width: 55px;
                height: 78px;
                font-size: 20px;
            }

            .btn {
                font-size: 11px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">ไพ่เสริมดวง</div>
        <div class="subtitle">ลองเลือกไพ่ 1 ใบดูสิ</div>

        <div class="chat" id="chat">
            <div class="chat-row">
                <img src="img/seer.png" class="avatar">
                <div class="bubble">
                    ลองเลือกไพ่ 1 ใบดูสิ ✨
                </div>
            </div>
        </div>

        <div class="cards">
            <div class="card-item">🔮</div>
            <div class="card-item">🔮</div>
            <div class="card-item">🔮</div>
            <div class="card-item">🔮</div>
            <div class="card-item">🔮</div>
            <div class="card-item">🔮</div>
        </div>

        <div class="btn-row">
            <button class="btn" id="resetBtn" onclick="resetCards()">เลือกใหม่</button>
            <a href="https://lunaheartlove.github.io/exampleDIY/" class="btn" id="nextBtn">ดูตัวอย่างเมนูอื่น</a>
        </div>

    </div>

    <script>
        const fortunes = [
            { text: "ความรักของคุณกำลังไปในทิศทางที่ดี ✨", card: "💫" },
            { text: "อีกไม่นานจะมีช่วงเวลาที่มีความสุขร่วมกัน", card: "🌙" },
            { text: "ความสัมพันธ์นี้เต็มไปด้วยความเข้าใจ 💞", card: "💞" },
            { text: "มีคนคอยใส่ใจคุณมากกว่าที่คิด 🌸", card: "🌸" },
            { text: "ช่วงเวลาธรรมดาจะกลายเป็นความทรงจำพิเศษ", card: "🍀" },
            { text: "ความรักครั้งนี้จะค่อยๆ เติบโตอย่างมั่นคง 🌱", card: "🌱" }
        ];

        const cards = document.querySelectorAll(".card-item");
        const chat = document.getElementById("chat");
        let opened = false;

        cards.forEach(card => {
            card.addEventListener("click", () => {
                if (opened) return;
                opened = true;

                const f = fortunes[Math.floor(Math.random() * fortunes.length)];
                card.classList.add("opened");
                card.textContent = f.card;

                document.querySelectorAll(".card-item").forEach(c => {
                    if (!c.classList.contains("opened")) {
                        c.classList.add("dimmed");
                    }
                });

                setTimeout(() => {
                    const row = document.createElement("div");
                    row.className = "chat-row";

                    const avatar = document.createElement("img");
                    avatar.src = "img/seer.png";
                    avatar.className = "avatar";

                    const bubble = document.createElement("div");
                    bubble.className = "bubble";
                    bubble.textContent = f.text;

                    row.appendChild(avatar);
                    row.appendChild(bubble);
                    chat.appendChild(row);
                    chat.scrollTop = chat.scrollHeight;

                    document.getElementById("resetBtn").style.display = "inline-block";
                    document.getElementById("nextBtn").style.display = "inline-block";
                }, 500);
            });
        });

        function resetCards() {
            opened = false;
            document.querySelectorAll(".card-item").forEach(c => {
                c.classList.remove("opened", "dimmed");
                c.textContent = "🔮";
            });
            chat.innerHTML = `
                <div class="chat-row">
                    <img src="img/seer.png" class="avatar">
                    <div class="bubble">ลองเลือกไพ่ 1 ใบดูสิ ✨</div>
                </div>`;
            document.getElementById("resetBtn").style.display = "none";
            document.getElementById("nextBtn").style.display = "none";
        }
    </script>

</body>

</html>
