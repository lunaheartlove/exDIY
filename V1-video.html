<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
            padding: 20px 0;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 22px 20px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 4px;
        }

        .page-sub {
            font-size: 13px;
            opacity: 0.6;
            text-align: center;
            margin-bottom: 16px;
        }

        /* ===== VIDEO ===== */
        .media-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 18px;
            overflow: hidden;
            background: linear-gradient(135deg, #F5EFFF, #FFE4EC);
            margin-bottom: 14px;
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.2);
        }

        .media-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ป้ายสด LIVE มุมบนซ้าย */
        .live-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            color: #E85A8B;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .live-badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #E85A8B;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        /* ===== TEXT ===== */
        .video-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .video-title svg {
            flex-shrink: 0;
        }

        .video-sub {
            letter-spacing: 0.2px;
            line-height: 1.8;
            font-size: 12px;
            opacity: 0.55;
            margin-bottom: 14px;
        }

        /* ===== CHANNEL ===== */
        .channel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-top: 1px solid rgba(139, 123, 175, 0.12);
            border-bottom: 1px solid rgba(139, 123, 175, 0.12);
            margin-bottom: 14px;
        }

        .channel-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-wrap {
            position: relative;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFF;
            box-shadow: 0 2px 6px rgba(139, 123, 175, 0.25);
        }

        .avatar-ring {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFB3D1, #E2C6FF);
            z-index: -1;
        }

        .channel-info .channel-name {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
        }

        .channel-info .channel-sub {
            font-size: 11px;
            opacity: 0.55;
        }

        .subscribe {
            background: #8B7BAF;
            color: #FFF;
            border: none;
            border-radius: 999px;
            padding: 7px 16px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Mali', cursive;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(139, 123, 175, 0.3);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .subscribe:hover {
            background: #7A6AA0;
            transform: translateY(-1px);
        }

        .subscribe.subscribed {
            background: #E8D8FF;
            color: #5A4B6E;
            box-shadow: none;
        }

        /* ===== ACTIONS ===== */
        .actions {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 18px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 8px;
            border-radius: 14px;
            background: rgba(139, 123, 175, 0.08);
            font-size: 12px;
            color: #5A4B6E;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Mali', cursive;
            border: none;
        }

        .action-btn:hover {
            background: rgba(139, 123, 175, 0.15);
            transform: translateY(-1px);
        }

        .action-btn svg {
            flex-shrink: 0;
        }

        .action-btn.liked {
            background: rgba(255, 143, 171, 0.2);
            color: #E85A8B;
        }

        .action-btn.liked svg path {
            fill: #E85A8B;
            stroke: #E85A8B;
        }

        /* ===== BTN ===== */
        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
            font-family: 'Mali', cursive;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.45);
        }

        .btn-row {
            display: flex;
            justify-content: center;
        }

        @media (max-width: 360px) {
            .card {
                padding: 18px 14px 20px;
                border-radius: 22px;
            }

            .page-title {
                font-size: 18px;
            }

            .video-title {
                font-size: 14px;
            }

            .action-btn {
                font-size: 11px;
                padding: 8px 6px;
            }

            .subscribe {
                font-size: 11px;
                padding: 6px 12px;
            }

            .btn {
                font-size: 14px;
                padding: 8px 18px;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                align-items: flex-start;
                padding: 10px 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 18px 14px 20px;
            }

            .page-title {
                font-size: 18px;
            }

            .page-sub {
                font-size: 11px;
                margin-bottom: 12px;
            }

            .media-box {
                border-radius: 14px;
            }

            .video-title {
                font-size: 14px;
            }

            .video-sub {
                font-size: 11px;
            }

            .avatar {
                width: 30px;
                height: 30px;
            }

            .channel-info .channel-name {
                font-size: 13px;
            }

            .channel-info .channel-sub {
                font-size: 10px;
            }

            .subscribe {
                font-size: 11px;
                padding: 6px 12px;
            }

            .actions {
                gap: 6px;
            }

            .action-btn {
                font-size: 11px;
                padding: 8px 6px;
            }

            .btn {
                font-size: 14px;
                padding: 8px 18px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 20px 18px 22px;
            }

            .video-title {
                font-size: 15px;
            }

            .action-btn {
                font-size: 12px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 400px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 420px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
                align-items: center;
            }

            .card {
                padding: 14px;
            }

            .page-title {
                font-size: 16px;
            }

            .page-sub {
                font-size: 11px;
                margin-bottom: 8px;
            }

            .video-title {
                font-size: 13px;
            }

            .video-sub {
                font-size: 10px;
            }

            .avatar {
                width: 26px;
                height: 26px;
            }

            .channel-info .channel-name {
                font-size: 12px;
            }

            .channel-info .channel-sub {
                font-size: 10px;
            }

            .subscribe {
                font-size: 10px;
                padding: 5px 10px;
            }

            .action-btn {
                font-size: 10px;
                padding: 6px 4px;
            }

            .btn {
                font-size: 12px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="page-title">คลิปความทรงจำ</div>
        <div class="page-sub">เก็บช่วงเวลาดี ๆ ของเราไว้</div>

        <div class="media-box">
            <video id="memoryVideo" autoplay muted loop playsinline>
                <source src="video/Video1.mov" type="video/mp4">
            </video>
        </div>

        <div class="video-title">
            ช่วงเวลาที่เรายิ้มด้วยกัน
        </div>
        <div class="video-sub">1M views · 1 วันที่แล้ว</div>

        <div class="channel">
            <div class="channel-left">
                <div class="avatar-wrap">
                    <div class="avatar-ring"></div>
                    <img src="img/p3.jpg" class="avatar">
                </div>
                <div class="channel-info">
                    <div class="channel-name">Our Love</div>
                    <div class="channel-sub">999K ผู้ติดตาม</div>
                </div>
            </div>
            <button class="subscribe" id="subBtn" onclick="toggleSub()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                    <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <span id="subText">ติดตาม</span>
            </button>
        </div>

        <div class="actions">
            <button class="action-btn" id="likeBtn" onclick="toggleLike()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 7a5.5 5.5 0 0 1 9.5 5c-2.5 4.5-9.5 9-9.5 9z"
                        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                </svg>
                <span id="likeCount">12K</span>
            </button>

            <button class="action-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                แชร์
            </button>

            <button class="action-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                บันทึก
            </button>
        </div>

        <div class="btn-row">
            <button class="btn" onclick="location.href='https://lunaheartlove.github.io/exampleDIY/'">
                ดูตัวอย่างเมนูอื่น
            </button>
        </div>

    </div>

    <script>
        const video = document.getElementById("memoryVideo");
        video.muted = true;
        const playPromise = video.play();
        if (playPromise) {
            playPromise.catch(() => { });
        }

        let liked = false;
        let count = 12000;
        function formatCount(n) {
            if (n >= 1000) return (n / 1000).toFixed(1).replace('.0', '') + "K";
            return n;
        }
        function toggleLike() {
            const btn = document.getElementById("likeBtn");
            const label = document.getElementById("likeCount");
            liked = !liked;
            if (liked) {
                btn.classList.add("liked");
                count++;
            } else {
                btn.classList.remove("liked");
                count--;
            }
            label.innerText = formatCount(count);
        }

        let subscribed = false;
        function toggleSub() {
            const btn = document.getElementById("subBtn");
            const text = document.getElementById("subText");
            subscribed = !subscribed;
            if (subscribed) {
                btn.classList.add("subscribed");
                text.innerText = "ติดตามแล้ว";
            } else {
                btn.classList.remove("subscribed");
                text.innerText = "ติดตาม";
            }
        }
    </script>

</body>

</html>
