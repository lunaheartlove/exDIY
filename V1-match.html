<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 95%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 24px 16px 26px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            letter-spacing: 0.2px;
            line-height: 1.8;
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 16px;
        }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .card-item {
            width: 100%;
            aspect-ratio: 1/1;
            perspective: 800px;
        }

        .inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.4s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-item.flipped .inner {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 14px;
            backface-visibility: hidden;
        }

        .front {
            background: linear-gradient(135deg,
                    rgba(255, 179, 209, 0.4),
                    rgba(226, 198, 255, 0.4));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px #eee;
        }

        .back {
            transform: rotateY(180deg);
            overflow: hidden;
        }

        .back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-item.matched {
            opacity: 0.6;
            pointer-events: none;
        }

        /* ===== BTN ===== */
        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: 0.25s;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* ===== POPUP ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .popup {
            background: #fff;
            padding: 22px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .popup-text {
            margin-bottom: 14px;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">เกมจับคู่ความทรงจำ</div>
        <div class="subtitle">จับคู่ภาพให้ครบทั้งหมด</div>

        <div class="grid" id="grid"></div>

        <div class="btn-row">
            <button class="btn" onclick="restartGame()">เล่นใหม่</button>
            <button class="btn" onclick="location.href='https://lunaheartlove.github.io/exampleDIY/'">ดูตัวอย่างเมนูอื่น</button>
        </div>

    </div>

    <!-- popup -->
    <div class="overlay" id="winPopup">
        <div class="popup">
            <div class="popup-text">เก่งมากเลย จำได้ครบทุกภาพแล้ว</div>
            <button class="btn" onclick="closePopup()">ปิด</button>
        </div>
    </div>

    <script>
        const images = [
            "img/p1.jpg", "img/p2.jpg", "img/p3.jpg", "img/p4.jpg",
            "img/p5.jpg", "img/p6.jpg", "img/p7.jpg", "img/p8.jpg"
        ];

        let cards = [...images, ...images]; // 8 คู่
        let flipped = [];
        let lock = false;
        let matchedCount = 0;

        const grid = document.getElementById("grid");

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            grid.innerHTML = "";
            matchedCount = 0;
            flipped = [];
            lock = false;

            const shuffled = shuffle(cards);

            shuffled.forEach(src => {
                const card = document.createElement("div");
                card.className = "card-item";

                card.innerHTML = `
                    <div class="inner">
                        <div class="face front"></div>
                        <div class="face back">
                            <img src="${src}">
                        </div>
                    </div>
                `;

                card.addEventListener("click", () => flipCard(card, src));
                grid.appendChild(card);
            });
        }

        function flipCard(card, src) {
            if (lock || card.classList.contains("flipped")) return;

            card.classList.add("flipped");
            flipped.push({ card, src });

            if (flipped.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            lock = true;

            const [a, b] = flipped;

            if (a.src === b.src) {
                a.card.classList.add("matched");
                b.card.classList.add("matched");
                matchedCount++;

                flipped = [];
                lock = false;

                if (matchedCount === 8) {
                    setTimeout(() => {
                        document.getElementById("winPopup").classList.add("show");
                    }, 400);
                }

            } else {
                setTimeout(() => {
                    a.card.classList.remove("flipped");
                    b.card.classList.remove("flipped");
                    flipped = [];
                    lock = false;
                }, 700);
            }
        }

        function restartGame() {
            createBoard();
        }

        function closePopup() {
            document.getElementById("winPopup").classList.remove("show");
        }

        createBoard();
    </script>

</body>

</html>
