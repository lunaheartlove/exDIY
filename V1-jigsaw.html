<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 30px 22px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            letter-spacing: 0.2px;
            line-height: 1.8;
            font-size: 15px;
            opacity: 0.7;
            margin-bottom: 18px;
        }

        .puzzle {
            width: 340px;
            height: 340px;
            margin: 0 auto 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 3px;
            background: #ffffffcc;
            border-radius: 18px;
            overflow: hidden;
        }

        .piece {
            background-image: url('img/p1.jpg');
            background-size: 340px 340px;
            cursor: pointer;
            transition: 0.2s;
        }

        .piece.selected {
            outline: 3px solid #8B7BAF;
            transform: scale(1.05);
        }

        .status {
            font-size: 14px;
            margin-bottom: 12px;
            opacity: 0.7;
            min-height: 18px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #8B7BAF;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: 0.25s;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        .popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .popup.show {
            display: flex;
        }

        .popup-box {
            background: #fff;
            padding: 22px;
            border-radius: 20px;
            text-align: center;
            width: 280px;
        }

        .popup-box h2 {
            font-size: 18px;
            margin-bottom: 6px;
        }

        .popup-box p {
            font-size: 14px;
            margin-bottom: 10px;
        }

        @media (max-width: 360px) {
            .puzzle {
                width: 240px;
                height: 240px;
            }

            .piece {
                background-size: 240px 240px;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 20px 14px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 13px;
            }

            .puzzle {
                width: 240px;
                height: 240px;
            }

            .piece {
                background-size: 240px 240px;
            }

            .status {
                font-size: 12px;
            }

            .btn {
                font-size: 12px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 24px 18px;
            }

            .puzzle {
                width: 280px;
                height: 280px;
            }

            .piece {
                background-size: 280px 280px;
            }

            .title {
                font-size: 20px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 460px;
            }

            .puzzle {
                width: 300px;
                height: 300px;
            }

            .piece {
                background-size: 300px 300px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 500px;
            }

            .puzzle {
                width: 320px;
                height: 320px;
            }

            .piece {
                background-size: 320px 320px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
                align-items: center;
            }

            .card {
                padding: 14px;
            }

            .title {
                font-size: 16px;
            }

            .subtitle {
                font-size: 12px;
            }

            .puzzle {
                width: 220px;
                height: 220px;
            }

            .piece {
                background-size: 220px 220px;
            }

            .status {
                font-size: 11px;
            }

            .btn {
                font-size: 11px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">มาต่อจิ๊กซอว์กัน</div>
        <div class="subtitle">แตะ 2 ชิ้นเพื่อสลับตำแหน่ง</div>

        <div id="puzzle" class="puzzle"></div>

        <div class="status" id="status">เริ่มเล่นได้เลย~</div>

        <div class="btn-row">
            <button class="btn" id="shuffleBtn">สับใหม่</button>
            <button class="btn" onclick="location.href='#'">กลับหน้าเมนู</button>
        </div>

    </div>

    <div id="popup" class="popup">
        <div class="popup-box">
            <h2>ต่อเสร็จแล้ว</h2>
            <p>เก่งมากเลยนะ</p>
            <button class="btn" onclick="closePopup()">ปิด</button>
        </div>
    </div>

    <script>
        const puzzle = document.getElementById("puzzle");
        const statusEl = document.getElementById("status");
        const popup = document.getElementById("popup");

        let selected = null;

        function createPuzzle() {
            puzzle.innerHTML = "";

            for (let i = 0; i < 9; i++) {
                const piece = document.createElement("div");
                piece.className = "piece";
                piece.dataset.index = i;

                const row = Math.floor(i / 3);
                const col = i % 3;

                piece.style.backgroundPosition =
                    `${-col * 100}% ${-row * 100}%`;

                puzzle.appendChild(piece);
            }
        }

        function shuffle() {
            const pieces = Array.from(puzzle.children);
            pieces.sort(() => Math.random() - 0.5);
            pieces.forEach(p => puzzle.appendChild(p));

            statusEl.innerText = "สู้ๆ!";
        }

        function checkWin() {
            const pieces = Array.from(puzzle.children);
            const win = pieces.every((p, i) => p.dataset.index == i);

            if (win) {
                statusEl.innerText = "เก่งมากเลย!";
                popup.classList.add("show");
            }
        }

        puzzle.addEventListener("click", e => {
            if (!e.target.classList.contains("piece")) return;

            if (!selected) {
                selected = e.target;
                selected.classList.add("selected");
            } else if (selected === e.target) {
                selected.classList.remove("selected");
                selected = null;
            } else {
                const a = selected;
                const b = e.target;
                const parent = puzzle;

                const aNext = a.nextSibling === b ? a : a.nextSibling;

                parent.insertBefore(a, b);
                parent.insertBefore(b, aNext);

                selected.classList.remove("selected");
                selected = null;

                checkWin();
            }
        });

        document.getElementById("shuffleBtn").onclick = shuffle;

        function closePopup() {
            popup.classList.remove("show");
        }

        createPuzzle();
        shuffle();
    </script>

</body>

</html>
