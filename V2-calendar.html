<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .container {
            width: 90%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .couple-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 12px;
        }

        .title {
            font-size: 24px;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 5px;
            font-size: 22px;
        }

        .calendar-box {
            background: #ffffffcc;
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 0 1px #eee;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        .dates {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .date {
            aspect-ratio: 1/1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 14px;
            background: #f7f7f7;
            transition: 0.2s;
            font-size: 15px;
        }

        .date:hover {
            background: #ececec;
        }

        .today {
            background: #BFE7FF !important;
            color: white;
            font-weight: bold;
        }

        .love-day {
            background: #FFB3D1 !important;
            color: white;
            font-weight: bold;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .legend div {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .box-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        .blue {
            background: #BFE7FF;
        }

        .pink {
            background: #FFB3D1;
        }

        .counter-box {
            background: #ffffffcc;
            padding: 18px;
            border-radius: 18px;
            box-shadow: inset 0 0 0 1px #eee;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .time-box {
            background: white;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .time-box h3 {
            font-size: 20px;
        }

        .time-box p {
            font-size: 12px;
        }

        .btn {
            margin-top: 10px;
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        .counter-title {
            margin-bottom: 10px;
            font-size: 18px;
        }

        #monthYear {
            margin-bottom: 20px;
            font-size: 18px;
        }

        @media (max-width: 360px) {
            .container {
                padding: 18px 14px;
                border-radius: 18px;
            }

            h2 {
                font-size: 18px;
            }

            .calendar-box,
            .counter-box {
                padding: 12px;
            }

            .days {
                font-size: 11px;
            }

            .dates {
                gap: 6px;
            }

            .date {
                font-size: 12px;
                border-radius: 10px;
            }

            .legend {
                font-size: 11px;
                gap: 6px;
            }

            .box-color {
                width: 10px;
                height: 10px;
            }

            .grid {
                gap: 8px;
            }

            .time-box {
                padding: 8px;
            }

            .time-box h3 {
                font-size: 14px;
            }

            .time-box p {
                font-size: 10px;
            }

            .btn {
                font-size: 12px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            .container {
                padding: 22px 18px;
            }

            h2 {
                font-size: 20px;
            }

            .date {
                font-size: 13px;
            }

            .time-box h3 {
                font-size: 16px;
            }

            .time-box p {
                font-size: 11px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .container {
                max-width: 480px;
            }

            .date {
                font-size: 14px;
            }

            .time-box h3 {
                font-size: 18px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .container {
                max-width: 500px;
            }

            .date {
                font-size: 15px;
            }
        }

        @media (max-width: 430px) {
            .container {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                align-items: flex-start;
                padding: 10px 0;
            }

            .container {
                margin-top: 10px;
                padding: 15px;
            }

            h2 {
                font-size: 16px;
            }

            .calendar-box,
            .counter-box {
                padding: 10px;
            }

            .date {
                font-size: 11px;
            }

            .time-box h3 {
                font-size: 13px;
            }

            .time-box p {
                font-size: 9px;
            }

            .btn {
                font-size: 12px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="title">ปฏิทินวันครบรอบ</div>

        <div class="legend">
            <div><span class="box-color blue"></span>วันปัจจุบัน</div>
            <div><span class="box-color pink"></span>วันครบรอบ</div>
        </div>

        <div class="calendar-box">

            <div id="monthYear"></div>

            <div class="days">
                <div>อา</div>
                <div>จ</div>
                <div>อ</div>
                <div>พ</div>
                <div>พฤ</div>
                <div>ศ</div>
                <div>ส</div>
            </div>

            <div class="dates" id="dates"></div>
        </div>

        <div class="counter-box">

            <div class="counter-title">เราคบกันมาแล้ว</div>

            <div class="grid">
                <div class="time-box">
                    <h3 id="days"></h3>
                    <p>วัน</p>
                </div>
                <div class="time-box">
                    <h3 id="hours"></h3>
                    <p>ชั่วโมง</p>
                </div>
                <div class="time-box">
                    <h3 id="minutes"></h3>
                    <p>นาที</p>
                </div>
                <div class="time-box">
                    <h3 id="seconds"></h3>
                    <p>วินาที</p>
                </div>
            </div>
        </div>

        <button class="btn" onclick="location.href='https://lunaheartlove.github.io/exampleDIY/'">
            ดูตัวอย่างเมนูอื่น
        </button>

    </div>

    <script>
        const loveDate = new Date("2024-04-23T00:00:00");

        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        let lastDate = new Date().getDate();

        function renderCalendar() {
            const now = new Date();

            const datesEl = document.getElementById("dates");
            const monthYear = document.getElementById("monthYear");

            datesEl.innerHTML = "";

            const year = now.getFullYear();
            const month = now.getMonth();

            currentMonth = month;
            currentYear = year;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDateOfMonth = new Date(year, month + 1, 0).getDate();

            monthYear.innerText = now.toLocaleString('th-TH', {
                month: 'long',
                year: 'numeric'
            });

            for (let i = 0; i < firstDay; i++) {
                datesEl.innerHTML += "<div></div>";
            }

            for (let d = 1; d <= lastDateOfMonth; d++) {
                const div = document.createElement("div");
                div.className = "date";
                div.innerText = d;

                if (d === now.getDate()) {
                    div.classList.add("today");
                }

                if (d === loveDate.getDate()) {
                    div.classList.add("love-day");
                }

                datesEl.appendChild(div);
            }
        }

        function updateCounter() {
            const now = new Date();
            const diff = now - loveDate;

            document.getElementById("days").innerText =
                Math.floor(diff / (1000 * 60 * 60 * 24));

            document.getElementById("hours").innerText =
                Math.floor(diff / (1000 * 60 * 60)) % 24;

            document.getElementById("minutes").innerText =
                Math.floor(diff / (1000 * 60)) % 60;

            document.getElementById("seconds").innerText =
                Math.floor(diff / 1000) % 60;

            if (now.getDate() !== lastDate) {
                lastDate = now.getDate();
                renderCalendar();
            }

            if (
                now.getMonth() !== currentMonth ||
                now.getFullYear() !== currentYear
            ) {
                renderCalendar();
            }
        }

        renderCalendar();
        updateCounter();

        setInterval(updateCounter, 1000);
    </script>

</body>

</html>
