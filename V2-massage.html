<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 24px 18px 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-size: 22px;
            margin-bottom: 15px;
            text-align: center;
        }

        .chat {
            width: 100%;
            max-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 18px;
        }

        .chat::-webkit-scrollbar {
            width: 4px;
        }

        .chat::-webkit-scrollbar-thumb {
            background: rgba(139, 123, 175, 0.25);
            border-radius: 999px;
        }

        .system {
            text-align: center;
            font-size: 12px;
            opacity: 0.5;
            margin: 2px 0 4px;
        }

        .message {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .bubble {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 14px;
            border-radius: 0 16px 16px 16px;
            font-size: 14px;
            line-height: 1.7;
            max-width: 250px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            animation: fadeUp 0.35s ease;
            border: 1px solid rgba(139, 123, 175, 0.1);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 0 16px 16px 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(139, 123, 175, 0.1);
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(139, 123, 175, 0.5);
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-5px);
            }
        }

        /* Button */
        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
            display: inline-block;
            text-decoration: none;
            font-family: 'Mali', cursive;
            margin-top: 2px;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.45);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
            }

            .card {
                padding: 20px 14px;
            }

            .title {
                font-size: 18px;
            }

            .chat {
                max-height: 220px;
                gap: 8px;
            }

            .avatar {
                width: 26px;
                height: 26px;
            }

            .bubble {
                font-size: 12px;
                padding: 8px 10px;
                max-width: 180px;
            }

            .typing-dots {
                padding: 8px 10px;
            }

            .dot {
                width: 6px;
                height: 6px;
            }

            .btn {
                font-size: 13px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
            }

            .card {
                padding: 24px 18px;
            }

            .chat {
                max-height: 260px;
            }

            .bubble {
                font-size: 13px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 400px;
            }

            .chat {
                max-height: 280px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 420px;
            }

            .chat {
                max-height: 320px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                padding: 10px 0;
                align-items: center;
            }

            .card {
                padding: 14px;
            }

            .title {
                font-size: 16px;
                margin-bottom: 10px;
            }

            .chat {
                max-height: 180px;
                gap: 6px;
            }

            .bubble {
                font-size: 11px;
                padding: 6px 8px;
                max-width: 160px;
            }

            .avatar {
                width: 24px;
                height: 24px;
            }

            .typing-dots {
                padding: 6px 8px;
            }

            .dot {
                width: 5px;
                height: 5px;
            }

            .btn {
                font-size: 12px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">ข้อความถึงคนน่ารัก</div>

        <div class="chat" id="chat">

            <div class="system">วันนี้</div>

            <div class="message">
                <img src="img/p2.jpg" class="avatar">
                <div class="bubble">เค้ามีอะไรอยากบอกเธอ</div>
            </div>

        </div>

        <button class="btn" id="actionBtn" onclick="nextMessage()">
            อ่านต่อ
        </button>

    </div>

    <script>
        const messages = [
            "ขอบคุณที่อยู่ด้วยกันมาตลอดนะ",
            "ถึงบางวันจะงอแงบ้าง",
            "แต่ก็ยังอยากมีเธออยู่ข้าง ๆ ทุกวัน",
            "อยู่ด้วยกันไปนาน ๆ เลยนะ",
            "รักเธอมาก ๆ เลย "
        ];

        let index = 0;
        let busy = false;
        const chat = document.getElementById("chat");
        const btn = document.getElementById("actionBtn");

        function showTyping() {
            const row = document.createElement("div");
            row.className = "typing";
            row.id = "typing";

            const avatar = document.createElement("img");
            avatar.src = "img/p2.jpg";
            avatar.className = "avatar";

            const dots = document.createElement("div");
            dots.className = "typing-dots";
            dots.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;

            row.appendChild(avatar);
            row.appendChild(dots);
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById("typing");
            if (t) t.remove();
        }

        function nextMessage() {
            if (busy) return;

            if (index >= messages.length) {
                window.location.href = "#";
                return;
            }

            busy = true;
            btn.disabled = true;

            showTyping();
            chat.scrollTop = chat.scrollHeight;

            setTimeout(() => {
                removeTyping();

                const row = document.createElement("div");
                row.className = "message";

                const avatar = document.createElement("img");
                avatar.src = "img/p2.jpg";
                avatar.className = "avatar";

                const bubble = document.createElement("div");
                bubble.className = "bubble";
                bubble.textContent = messages[index];

                row.appendChild(avatar);
                row.appendChild(bubble);
                chat.appendChild(row);
                chat.scrollTop = chat.scrollHeight;

                index++;

                if (index >= messages.length) {
                    btn.textContent = "กลับหน้าเมนู";
                }

                btn.disabled = false;
                busy = false;
            }, 900);
        }
    </script>

</body>

</html>
