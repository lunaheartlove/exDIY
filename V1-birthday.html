<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
            padding: 24px 0;
        }

        .card {
            width: 90%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            letter-spacing: 0.2px;
            line-height: 1.8;
            font-size: 14px;
            opacity: 0.65;
            margin-bottom: 20px;
        }

        /* ===== เค้กวันเกิด CSS ===== */
        .cake-wrap {
            margin: 0 auto 18px;
            width: 200px;
            height: 180px;
            position: relative;
        }

        .cake-svg {
            width: 100%;
            height: 100%;
        }

        /* เปลวเทียน flicker */
        .flame {
            transform-origin: center bottom;
            animation: flicker 1.2s ease-in-out infinite;
        }

        @keyframes flicker {

            0%,
            100% {
                transform: scale(1) translateY(0);
            }

            50% {
                transform: scale(0.9, 1.05) translateY(-1px);
            }
        }

        /* ดาวประดับ */
        .sparkle-emoji {
            position: absolute;
            font-size: 16px;
            color: #FFD966;
            animation: twinkle 2s infinite ease-in-out;
        }

        .sp-1 {
            top: 5px;
            left: 20px;
            animation-delay: 0s;
        }

        .sp-2 {
            top: 30px;
            right: 15px;
            animation-delay: 0.6s;
            font-size: 14px;
        }

        .sp-3 {
            bottom: 50px;
            left: 10px;
            animation-delay: 1.2s;
            font-size: 12px;
            color: #FFB3D1;
        }

        .sp-4 {
            top: 60px;
            right: 30px;
            animation-delay: 1.5s;
            font-size: 13px;
            color: #C9B0FF;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(0.9);
            }

            50% {
                opacity: 1;
                transform: scale(1.15);
            }
        }

        /* ===== กล่องนับปี (เด่น) ===== */
        .year-box {
            background: linear-gradient(135deg,
                    rgba(255, 179, 209, 0.25),
                    rgba(226, 198, 255, 0.3));
            border: 2px dashed rgba(139, 123, 175, 0.35);
            border-radius: 20px;
            padding: 18px 16px;
            margin-bottom: 16px;
        }

        .year-label {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .year-number {
            font-size: 38px;
            font-weight: 600;
            color: #8B7BAF;
            line-height: 1.1;
        }

        .year-unit {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 2px;
        }

        /* ===== Counter grid (วัน/ชม/นาที/วินาที) ===== */
        .counter-box {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 18px;
            padding: 16px 12px;
            margin-bottom: 18px;
            box-shadow: inset 0 0 0 1px rgba(139, 123, 175, 0.1);
        }

        .counter-title {
            font-size: 13px;
            opacity: 0.65;
            margin-bottom: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .time-box {
            background: #fff;
            padding: 10px 6px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(139, 123, 175, 0.12);
        }

        .time-box h3 {
            font-size: 18px;
            font-weight: 600;
            color: #8B7BAF;
            line-height: 1.1;
        }

        .time-box p {
            font-size: 11px;
            opacity: 0.65;
            margin-top: 3px;
        }

        /* ===== ข้อความหวานๆ ===== */
        .sweet-msg {
            font-size: 14px;
            line-height: 1.8;
            padding: 14px 16px;
            background: linear-gradient(135deg,
                    rgba(255, 179, 209, 0.18),
                    rgba(226, 198, 255, 0.22));
            border-radius: 14px;
            margin-bottom: 18px;
        }

        /* ===== BUTTON ===== */
        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
            font-family: 'Mali', cursive;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.45);
        }

        /* คอนเฟตติลอย */
        .confetti-wrap {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .confetti {
            position: absolute;
            top: -20px;
            font-size: 14px;
            opacity: 0;
            animation: confettiFall linear infinite;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 22px 12px;
            }

            .cake-wrap {
                width: 150px;
                height: 140px;
            }

            .year-number {
                font-size: 28px;
            }

            .counter-box {
                padding: 10px 6px;
                overflow: hidden;
            }

            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 6px;
            }

            .time-box {
                padding: 8px 4px;
                min-width: 0;
            }

            .time-box h3 {
                font-size: clamp(11px, 3.5vw, 14px);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .time-box p {
                font-size: 10px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            .card {
                padding: 24px 14px;
            }

            .cake-wrap {
                width: 170px;
                height: 150px;
            }

            .year-number {
                font-size: 32px;
            }

            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .time-box h3 {
                font-size: clamp(12px, 3.5vw, 16px);
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 440px;
            }

            .cake-wrap {
                width: 180px;
                height: 160px;
            }

            .year-number {
                font-size: 34px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 460px;
            }

            .cake-wrap {
                width: 190px;
                height: 170px;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                align-items: flex-start;
                padding: 10px 0;
            }

            .cake-wrap {
                width: 140px;
                height: 120px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <!-- คอนเฟตติลอย -->
    <div class="confetti-wrap" id="confettiWrap"></div>

    <div class="card">

        <div class="title">วันเกิดของเธอ</div>
        <div class="subtitle">ตั้งแต่เธอเกิดมาจนถึงตอนนี้</div>

        <!-- เค้กวันเกิด -->
        <div class="cake-wrap">
            <div class="sparkle-emoji sp-1">✦</div>
            <div class="sparkle-emoji sp-2">✧</div>
            <div class="sparkle-emoji sp-3">✿</div>
            <div class="sparkle-emoji sp-4">✦</div>

            <svg class="cake-svg" viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="cakeTop" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#FFE4ED" />
                        <stop offset="100%" stop-color="#FFB3D1" />
                    </linearGradient>
                    <linearGradient id="cakeMid" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#FFF0F5" />
                        <stop offset="100%" stop-color="#FFCDDD" />
                    </linearGradient>
                    <linearGradient id="cakeBot" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#E8D4FF" />
                        <stop offset="100%" stop-color="#C9B0FF" />
                    </linearGradient>
                </defs>

                <!-- เปลวเทียน -->
                <g class="flame">
                    <ellipse cx="100" cy="22" rx="5" ry="9" fill="#FFD966" />
                    <ellipse cx="100" cy="20" rx="3" ry="6" fill="#FFF4B8" />
                    <ellipse cx="100" cy="18" rx="1.5" ry="3" fill="#FFFFFF" />
                </g>

                <!-- เทียน -->
                <rect x="96" y="32" width="8" height="22" fill="#FFAFCC" stroke="#E88BB0" stroke-width="1.5" rx="1" />
                <line x1="98" y1="38" x2="102" y2="38" stroke="#E88BB0" stroke-width="1" />
                <line x1="98" y1="44" x2="102" y2="44" stroke="#E88BB0" stroke-width="1" />

                <!-- ชั้นที่ 1 (บนสุด - เล็กสุด) -->
                <ellipse cx="100" cy="56" rx="35" ry="6" fill="#FF8FAB" />
                <rect x="65" y="56" width="70" height="22" fill="url(#cakeTop)" stroke="#E88BB0" stroke-width="1.5" />
                <ellipse cx="100" cy="78" rx="35" ry="6" fill="#FFB3D1" stroke="#E88BB0" stroke-width="1.5" />

                <!-- ครีมหยักชั้น 1 -->
                <path
                    d="M 65 60 Q 70 65, 75 60 Q 80 65, 85 60 Q 90 65, 95 60 Q 100 65, 105 60 Q 110 65, 115 60 Q 120 65, 125 60 Q 130 65, 135 60"
                    fill="none" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" />

                <!-- ชั้นที่ 2 (กลาง) -->
                <ellipse cx="100" cy="78" rx="55" ry="7" fill="#FFCDDD" stroke="#E88BB0" stroke-width="1.5" />
                <rect x="45" y="78" width="110" height="28" fill="url(#cakeMid)" stroke="#E88BB0" stroke-width="1.5" />
                <ellipse cx="100" cy="106" rx="55" ry="7" fill="#FFE4EC" stroke="#E88BB0" stroke-width="1.5" />

                <!-- ครีมหยักชั้น 2 -->
                <path
                    d="M 45 82 Q 51 88, 57 82 Q 63 88, 69 82 Q 75 88, 81 82 Q 87 88, 93 82 Q 99 88, 105 82 Q 111 88, 117 82 Q 123 88, 129 82 Q 135 88, 141 82 Q 147 88, 153 82"
                    fill="none" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" />

                <!-- เชอร์รี่บนชั้นกลาง -->
                <circle cx="60" cy="100" r="3.5" fill="#FF6B8A" stroke="#C93C6F" stroke-width="1" />
                <circle cx="59" cy="99" r="1" fill="#FFF" opacity="0.7" />
                <circle cx="100" cy="100" r="3.5" fill="#FF6B8A" stroke="#C93C6F" stroke-width="1" />
                <circle cx="99" cy="99" r="1" fill="#FFF" opacity="0.7" />
                <circle cx="140" cy="100" r="3.5" fill="#FF6B8A" stroke="#C93C6F" stroke-width="1" />
                <circle cx="139" cy="99" r="1" fill="#FFF" opacity="0.7" />

                <!-- ชั้นที่ 3 (ล่าง - ใหญ่สุด) -->
                <ellipse cx="100" cy="106" rx="75" ry="8" fill="#D4BFFF" stroke="#9B7FD4" stroke-width="1.5" />
                <rect x="25" y="106" width="150" height="38" fill="url(#cakeBot)" stroke="#9B7FD4" stroke-width="1.5" />
                <ellipse cx="100" cy="144" rx="75" ry="8" fill="#E8D4FF" stroke="#9B7FD4" stroke-width="1.5" />

                <!-- ครีมหยักชั้น 3 -->
                <path
                    d="M 25 112 Q 32 118, 39 112 Q 46 118, 53 112 Q 60 118, 67 112 Q 74 118, 81 112 Q 88 118, 95 112 Q 102 118, 109 112 Q 116 118, 123 112 Q 130 118, 137 112 Q 144 118, 151 112 Q 158 118, 165 112 Q 172 118, 175 112"
                    fill="none" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" />

                <!-- จุดประดับชั้นล่าง -->
                <circle cx="50" cy="128" r="3" fill="#FFB3D1" />
                <circle cx="80" cy="135" r="3" fill="#BFE7FF" />
                <circle cx="120" cy="128" r="3" fill="#FFD966" />
                <circle cx="150" cy="135" r="3" fill="#FFB3D1" />

                <!-- จาน -->
                <ellipse cx="100" cy="154" rx="85" ry="6" fill="#F0E4F8" stroke="#9B7FD4" stroke-width="1.5" />
                <ellipse cx="100" cy="152" rx="80" ry="3" fill="#FFF" opacity="0.6" />
            </svg>
        </div>

        <!-- กล่องนับปีเด่น -->
        <div class="year-box">
            <div class="year-label">เธอเกิดมาแล้ว</div>
            <div class="year-number" id="years">0</div>
            <div class="year-unit">ปีแห่งความน่ารัก</div>
        </div>

        <!-- counter วัน/ชม/นาที/วินาที -->
        <div class="counter-box">
            <div class="counter-title">นับเป็นเวลาทั้งหมด</div>
            <div class="grid">
                <div class="time-box">
                    <h3 id="days">0</h3>
                    <p>วัน</p>
                </div>
                <div class="time-box">
                    <h3 id="hours">0</h3>
                    <p>ชั่วโมง</p>
                </div>
                <div class="time-box">
                    <h3 id="minutes">0</h3>
                    <p>นาที</p>
                </div>
                <div class="time-box">
                    <h3 id="seconds">0</h3>
                    <p>วินาที</p>
                </div>
            </div>
        </div>

        <button class="btn" onclick="location.href='https://lunaheartlove.github.io/exampleDIY/'">
            ดูตัวอย่างเมนูอื่น
        </button>
    </div>

    <script>
        // ⚠️ แก้วันเกิดที่นี่ (ปี-เดือน-วัน)
        const birthDate = new Date("2000-01-01T00:00:00");

        function updateCounter() {
            const now = new Date();
            const diff = now - birthDate;

            // คำนวณปี (แบบนับวันเกิดปีจริง)
            let years = now.getFullYear() - birthDate.getFullYear();
            const m = now.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && now.getDate() < birthDate.getDate())) {
                years--;
            }

            document.getElementById("years").innerText = years.toLocaleString('th-TH');

            // วัน/ชม/นาที/วินาที (รวมทั้งหมด)
            const totalSec = Math.floor(diff / 1000);
            const days = Math.floor(totalSec / 86400);
            const hours = Math.floor(totalSec / 3600);
            const minutes = Math.floor(totalSec / 60);
            const seconds = totalSec;

            document.getElementById("days").innerText = days.toLocaleString('th-TH');
            document.getElementById("hours").innerText = hours.toLocaleString('th-TH');
            document.getElementById("minutes").innerText = minutes.toLocaleString('th-TH');
            document.getElementById("seconds").innerText = seconds.toLocaleString('th-TH');
        }

        updateCounter();
        setInterval(updateCounter, 1000);

        // คอนเฟตติลอยด้านหลัง
        function makeConfetti() {
            const wrap = document.getElementById("confettiWrap");
            const colors = ["#FFB3D1", "#FF8FAB", "#E2C6FF", "#C9B0FF", "#BFE7FF", "#FFD966"];

            for (let i = 0; i < 18; i++) {
                const c = document.createElement("div");
                c.className = "confetti";
                c.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                c.style.color = colors[Math.floor(Math.random() * colors.length)];
                c.style.left = (Math.random() * 100) + "%";
                c.style.fontSize = (12 + Math.random() * 10) + "px";
                c.style.animationDuration = (6 + Math.random() * 6) + "s";
                c.style.animationDelay = (Math.random() * 8) + "s";
                wrap.appendChild(c);
            }
        }
        makeConfetti();
    </script>

</body>

</html>
