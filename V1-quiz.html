<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FFB3D1, #BFE7FF, #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            position: relative;
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            margin-top: 35px;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .title2 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .step-box {
            position: absolute;
            top: 18px;
            right: 18px;
            font-size: 12px;
            padding: 6px 14px;
            border: 1.5px solid #D6CCE8;
            border-radius: 999px;
            background: #ffffffcc;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 13px;
            margin-bottom: 18px;
        }

        .legend div {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .box {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        .blue {
            background: #EAF6FF;
        }

        .pink {
            background: #FFE4EC;
        }

        .question {
            padding: 16px;
            border: 2px dashed #D6CCE8;
            border-radius: 18px;
            margin-top: 10px;
            margin-bottom: 22px;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .answer {
            padding: 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }

        .answer:hover {
            transform: translateY(-2px);
        }

        .correct {
            background: #EAF6FF !important;
        }

        .wrong {
            background: #FFE4EC !important;
        }

        .btn {
            font-size: 14px;
            background-color: #8B7BAF;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
        }

        .result img {
            width: 120px;
            margin: 15px 0;
        }

        @media (max-width: 360px) {
            .card {
                padding: 20px 14px;
                border-radius: 20px;
            }

            .title,
            .title2 {
                font-size: 18px;
            }

            .step-box {
                font-size: 10px;
                padding: 4px 10px;
                top: 10px;
                right: 10px;
            }

            .legend {
                font-size: 11px;
                gap: 6px;
            }

            .box {
                width: 10px;
                height: 10px;
            }

            .question {
                padding: 12px;
                font-size: 13px;
                margin-bottom: 18px;
            }

            .answers {
                gap: 8px;
            }

            .answer {
                padding: 10px;
                font-size: 13px;
                border-radius: 16px;
            }

            .result img {
                width: 90px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            .card {
                padding: 24px 16px;
            }

            .title,
            .title2 {
                font-size: 20px;
            }

            .answer {
                font-size: 14px;
            }

            .question {
                font-size: 14px;
            }

            .result img {
                width: 100px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 400px;
            }

            .answer {
                font-size: 15px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 420px;
            }

            .answer {
                font-size: 16px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                align-items: flex-start;
                padding: 10px 0;
            }

            .card {
                margin-top: 10px;
                padding: 14px;
            }

            .title,
            .title2 {
                font-size: 16px;
            }

            .step-box {
                font-size: 9px;
                padding: 3px 8px;
            }

            .question {
                font-size: 12px;
                padding: 10px;
            }

            .answer {
                font-size: 12px;
                padding: 8px;
            }

            .result img {
                width: 80px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card" id="quizBox">

        <div class="title">ทำแบบทดสอบกัน</div>
        <div class="step-box" id="step"></div>

        <div class="legend">
            <div><span class="box blue"></span>ตอบถูก</div>
            <div><span class="box pink"></span>ตอบผิด</div>
        </div>

        <div class="question" id="question"></div>

        <div class="answers" id="answers"></div>

        <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>
            ข้อต่อไป
        </button>

    </div>

    <script>

        const quiz = [
            { q: "เราเจอกันครั้งแรกที่ไหน", a: ["มหาลัย", "ออนไลน์", "ร้านกาแฟ", "งานเลี้ยง"], correct: 1 },
            { q: "เวลาหงุดหงิด เราชอบทำอะไร", a: ["เงียบ", "ฟังเพลง", "กิน", "นอน"], correct: 2 },
            { q: "สีที่เราชอบคือ", a: ["ชมพู", "ฟ้า", "ม่วง", "ดำ"], correct: 0 },
            { q: "อาหารที่เราชอบ", a: ["ชาบู", "ส้มตำ", "หมูกระทะ", "พิซซ่า"], correct: 2 },
            { q: "เราอยากไปเที่ยวที่ไหน", a: ["ทะเล", "ภูเขา", "ต่างประเทศ", "อยู่บ้าน"], correct: 0 }
        ];

        let current = 0;
        let score = 0;

        function loadQuestion() {
            document.getElementById("step").innerText = `ข้อที่ ${current + 1} / ${quiz.length}`;
            document.getElementById("question").innerText = quiz[current].q;

            const answersBox = document.getElementById("answers");
            answersBox.innerHTML = "";

            quiz[current].a.forEach((text, index) => {
                const div = document.createElement("div");
                div.className = "answer";
                div.innerText = text;

                div.onclick = () => selectAnswer(div, index);

                answersBox.appendChild(div);
            });

            document.getElementById("nextBtn").disabled = true;
        }

        function selectAnswer(el, index) {
            const all = document.querySelectorAll(".answer");

            all.forEach(a => a.onclick = null);

            if (index === quiz[current].correct) {
                el.classList.add("correct");
                score++;
            } else {
                el.classList.add("wrong");
                all[quiz[current].correct].classList.add("correct");
            }

            document.getElementById("nextBtn").disabled = false;
        }

        function nextQuestion() {
            current++;

            if (current < quiz.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById("quizBox").innerHTML = `
                <div class="title2">คะแนนของเธอ</div>

                <div class="result">
                    <img src="img/image7.png">
                    <p style="margin-top:15px; margin-bottom:15px;">
                        เธอได้ ${score} / ${quiz.length} คะแนน
                    </p>
                </div>

                <button class="btn" style="margin-top:20px;" onclick="location.href='https://lunaheartlove.github.io/exampleDIY/'">
                    ดูตัวอย่างเมนูอื่น
                </button>
            `;
        }

        loadQuestion();

    </script>

</body>

</html>
